 <script>
	(function(window, undefined){
	 	var tools = new Object()
	 	var clones = new Array();
	 	
	 	window['$C'] = function(ctx){
	 		var ret = new PaintTools(ctx);
	 		ret.regist(drawLine);
	 		ret.regist(strokeRect);
			ret.regist(strokeCircle);
			ret.regist(drawText);
			ret.regist(drawArrow);
			ret.regist(drawStraightLine);
	 		return ret;
	 	}
	 	
		var PaintTools = function(_ctx){
	 		this.ctx = _ctx;
	 		this.drawType = '';
	 	};
	
	 	PaintTools.prototype.regist = function(tool){
	 		if(typeof tool.type !== 'undefined' && typeof tool.run !== 'undefined') {
	 			tools[tool.type] = tool;
	 		}
	 	};
	 	
	 	PaintTools.prototype.execute = function(){
	 		var args = [];
	 		for(var i=0; i<arguments.length; i++){
	 			args.push(arguments[i]);
	 		}
	 		if(typeof tools[this.drawType] !== 'undefined'){
	 			tools[this.drawType].run.apply(this, args);
	 		}
	 	};
	 	
	 	PaintTools.prototype.pushCanvas = function(){
	 		clones.push(this.ctx.getImageData(0, 0, this.ctx.canvas.width, this.ctx.canvas.height));
	 	};
	 	
	 	PaintTools.prototype.popCanvas = function(){
	 		if(clones.length>0) {
	 			this.ctx.putImageData(clones.pop(), 0, 0);
	 		}
	 	};
	 	
	 	PaintTools.prototype.restoreCanvas = function(){
	 		if(clones.length>0) {
	 			this.ctx.putImageData(clones[0], 0, 0);
	 		}
	 	};
	 	
	 	PaintTools.prototype.dropCanvas = function(){
	 		if(clones.length>0) {
	 			clones.pop();
	 		}
	 	}
	 	
	 	//畫筆
	 	var drawLine = {
	 		type: 'drawLine',
	 		run: function(x, y, x1, y1){
	 			this.ctx.beginPath();
				
				// 讓線條兩端變圓
				this.ctx.lineCap = "round"; 
				// 讓線條轉折處變圓				
				this.ctx.lineJoin = "round"; 
				
	 			this.ctx.moveTo(x,y);
	 			this.ctx.lineTo(x1,y1);
				//刪除這一行，畫線不需要閉合
	 			//this.ctx.closePath();
	 			this.ctx.stroke();
	 		}
	 	}
	 	
	 	//空心矩形
	 	var strokeRect = {
	 		type: 'strokeRect',
	 		run: function(x, y, x1, y1){
	 			this.ctx.beginPath();
	 			this.ctx.rect(x, y, x1-x, y1-y);
	 			this.ctx.closePath();
	 			this.ctx.stroke();
	 		}
	 	}
	 
	 	//空心圓
		var strokeCircle ={
	 		type: 'strokeCircle',
	 		run: function(x1, y1, x2, y2) {
	 			var radius = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2), 2);
	 			this.ctx.beginPath();
	 			this.ctx.arc(x2, y2, radius, 0, 2 * Math.PI, true);
	 			this.ctx.closePath();
	 			this.ctx.stroke();
	 		}
	 	};
	 
	 	//文字
		var drawText = {
	 		type: 'drawText',
	 		run: function(text, size, underline, x, y) {
			    size = parseInt(size, 10);
				size = size - size/2 + 3;
				let metrics = this.ctx.measureText(text);
	 			this.ctx.textAlign = 'left';
	 			this.ctx.fillText(text, x, y, metrics.width);

				if(underline){
					this.ctx.strokeStyle = $("#fillStyle").val();
					this.ctx.lineWidth = 1;
					this.ctx.beginPath();
					this.ctx.moveTo(x,y + size);
					this.ctx.lineTo(x + metrics.width,y + size);
					this.ctx.closePath();
					this.ctx.stroke();
					this.ctx.strokeStyle = $("#strokeStyle").val();
					this.ctx.lineWidth = $("#lineWidth").val();
				}
	 		}
	 	};
	 	
	 	//箭頭
	 	var drawArrow = {
	 		type: 'drawArrow',
	 		run: function(x, y, x1, y1){
	 		    
	 		    var theta = 30;
		        var headken = 15;
		        if($("#lineWidth").val() == '5')
		        	headken = 25;
		        else if($("#lineWidth").val() == '7')
		        	headken = 30;
		        var angle = Math.atan2(y - y1, x - x1) * 180/ Math.PI;
				var angle1 = (angle + theta) * Math.PI / 180;
				var angle2 = (angle - theta) * Math.PI / 180;
				var topX = headken * Math.cos(angle1);
				var topY = headken * Math.sin(angle1);
				var botX = headken * Math.cos(angle2);
				var botY = headken * Math.sin(angle2);
		        
	 			this.ctx.beginPath();
	 			var arrowX = x - x1;
				var arrowY = y - y1;
	 			this.ctx.moveTo(x,y);
	 			this.ctx.lineTo(x1,y1);
	 			arrowX = x1 + topX;
				arrowY = y1 + topY;
	 			this.ctx.moveTo(x1,y1);
	 			this.ctx.lineTo(arrowX,arrowY);
	 			arrowX = x1 + botX;
				arrowY = y1 + botY;
				this.ctx.moveTo(x1,y1);
	 			this.ctx.lineTo(arrowX,arrowY);
	 			this.ctx.closePath();
	 			this.ctx.stroke();
	 		}
	 	}
		
		//直線
	 	var drawStraightLine = {
	 		type: 'drawStraightLine',
	 		run: function(x, y, x1, y1){
	 			this.ctx.beginPath();
	 			this.ctx.moveTo(x,y);
	 			this.ctx.lineTo(x1,y1);
	 			this.ctx.closePath();
	 			this.ctx.stroke();
	 		}
	 	}
	 })(window);
	 
	$(function(){
		$(".screenCanvas").css('height', ($(window).height()-20) + 'px');
		var canvas = $('#canvas');
		var context = canvas[0].getContext('2d');
		var draftCanvas = $('#draftCanvas'); // 新增這行：取得草稿層
		var draftContext = draftCanvas[0].getContext('2d'); // 新增這行：取得草稿層的畫筆
		var drawing = false;
		var queue = new Array();
		var cPushArray = new Array();
		var start = new Array();
		var cStep = -1;
		var scale = 1;
		var basicW = 0;
		var basicH = 0;
		var imageW = 0;
		var imageH = 0;
		
		// 【重要】告訴瀏覽器：當手指在畫布上滑動時，不要觸發網頁的捲動或縮放
		draftCanvas[0].style.touchAction = 'none';
		
		// 判斷當前工具是否需要用到「透明草稿層」
		function isShapeTool(type) {
			return type === 'strokeRect' || type === 'strokeCircle' || type === 'drawArrow' || type === 'drawStraightLine';
		}

		// 1. 畫筆落下
		draftCanvas[0].addEventListener('pointerdown', function(e) {
			e.preventDefault();
			var x = e.offsetX;
			var y = e.offsetY;

			if (!drawing && tool.drawType == 'drawText') {
				e.stopPropagation();
				tool.ctx.textBaseline = 'middle';
				inputWord();
				drawing = true;
				start = [x, y];
			}
			
			if (!drawing && tool.drawType != 'drawText') {
				draftCanvas[0].dataset.cursor = draftCanvas[0].style.cursor;
				draftCanvas[0].style.cursor = 'crosshair';
				drawing = true;
				
				// 核心魔法：根據工具切換畫布！
				if (isShapeTool(tool.drawType)) {
					tool.ctx = draftContext; // 形狀工具：畫在草稿層
				} else {
					tool.ctx = context;      // 鉛筆/橡皮擦：直接畫在主畫布
				}
				
				var pressureLine = $("#lineWidth").val() * (e.pointerType === 'pen' ? e.pressure * 2 : 1);
				tool.ctx.lineWidth = pressureLine;
				
				tool.execute(x, y, x, y);
				queue.push([x, y]);
			}
		});

		// 2. 畫筆移動
		draftCanvas[0].addEventListener('pointermove', function(e) {
			e.preventDefault();
			if (drawing && tool.drawType != 'drawText') {
				var old = queue.shift();
				
				if (isShapeTool(tool.drawType)) {
					// 核心魔法：只要擦掉透明玻璃就好！不需要再讀寫龐大的底圖
					draftContext.clearRect(0, 0, draftCanvas[0].width, draftCanvas[0].height);
					queue.push(old);
				}
				
				var x = e.offsetX;
				var y = e.offsetY;
				
				var pressureLine = $("#lineWidth").val() * (e.pointerType === 'pen' ? e.pressure * 2 : 1);
				tool.ctx.lineWidth = pressureLine;
				
				tool.execute(old[0], old[1], x, y);
				
				if (tool.drawType == 'drawLine') {
					queue.push([x, y]);
				}
			}
		});

		// 3. 畫筆離開
		function endDrawing(e) {
			if (drawing && tool.drawType == 'drawText') {
				drawing = false;
			} else if (drawing && tool.drawType != 'drawText') {
				draftCanvas[0].style.cursor = draftCanvas[0].dataset.cursor || 'default';
				var old = queue.shift();
				var x = e.offsetX;
				var y = e.offsetY;
				
				tool.execute(old[0], old[1], x, y);
				
				// 核心魔法：如果是草稿層，現在要把結果印到底圖上
				if (isShapeTool(tool.drawType)) {
					context.drawImage(draftCanvas[0], 0, 0); // 印上主畫布
					draftContext.clearRect(0, 0, draftCanvas[0].width, draftCanvas[0].height); // 洗掉玻璃
					tool.ctx = context; // 切回主畫布
				}
				
				drawing = false;
				cPush(); // 存入歷史紀錄
			}
		}

		draftCanvas[0].addEventListener('pointerup', endDrawing);
		draftCanvas[0].addEventListener('pointerleave', endDrawing);
		draftCanvas[0].addEventListener('pointercancel', endDrawing);
		
		var tool = $C(context);
		
		//暫存畫布
		function cPush() {
			cStep++;
    
			// 如果在復原的狀態下又畫了新東西，就捨棄掉後面的歷史紀錄
			if (cStep < cPushArray.length) {
				cPushArray.length = cStep;
			}
				
			// 取得當前畫布的像素資料 (ImageData) 並存入陣列
			cPushArray.push(context.getImageData(0, 0, canvas[0].width, canvas[0].height));
			
			// 限制最多記錄 10 步 (加上初始狀態，陣列長度維持在 11 以內)
			if (cPushArray.length > 11) {
				 cPushArray.shift(); // 直接移除最舊的那一筆紀錄
				 cStep--;
			}
			
			// 更新按鈕狀態
			if (cStep > 0) {
			   $("#undo").removeClass('selectedTool').attr('disabled', false);
			}
			// 只要有新動作，Redo 就不該被觸發
			$("#redo").addClass('selectedTool').attr('disabled', true);
		}
	 
	    //回到上一個動作
		function cUndo() {
			if (cStep > 0) {
				cStep--;
				// 直接將像素陣列倒回畫布，零延遲！
				context.putImageData(cPushArray[cStep], 0, 0);
				
				// 更新按鈕狀態
				$("#redo").removeClass('selectedTool').attr('disabled', false);
				if (cStep === 0) {
					$("#undo").addClass('selectedTool').attr('disabled', true);
				}
			}
		}
		
		//回到下一個動作
		function cRedo() {
			if (cStep < cPushArray.length - 1) {
				cStep++;
				// 直接將像素陣列倒回畫布
				context.putImageData(cPushArray[cStep], 0, 0);
				
				// 更新按鈕狀態
				$("#undo").removeClass('selectedTool').attr('disabled', false);
				if (cStep === cPushArray.length - 1) {
				   $("#redo").addClass('selectedTool').attr('disabled', true);
				}
			}
		}
		
		//存檔作業
		function cSave(){
			//顯示base64格式
		   alert(canvas[0].toDataURL('image/jpeg'));
		}
		
		//載入底圖
		drawImage('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA0EAAAHjCAIAAABq1INCAAAAA3NCSVQICAjb4U/gAAABmHpUWHRSYXcgcHJvZmlsZSB0eXBlIEFQUDEAADiNzVNJbsMwDLz7FXkCF4mSn+M4UhGgaIv8/9ChJTtOkDa5FKgIm9R4uMoa3spHuZznw9fls57fy3DwZZaHMIZRJiLK1JYSsRC7xrutrpVhCYzU99K0jTlR2PGmpuceM4JhapzwNAd/jS1OWNOqQBBjoke5yYvc5QitwpZshxftVrzFp16T0BS8B+l4Xvte22djHTWaGVvUrAGVm6J+Dar4Qr9LT9LyyrW/KPDNHbvtmze/dTZ6N3/ro5iAxCvO1iw+3uGlWZLv4sg2U9nPRnocoDd4ss2zzTxv/g/3tZ5yrWUBwhQM/5YtG95Y3HlHeHtlEfWFRRR2s+IihinN+CtTl0pHyEgzM1UWiGtffmQzJ+jAE8cFy/icsTtB6iLKSUSCCBcJ4BdgZauEe9a05C3Im6mAExArcPl7qXX28bDfQx/acgtY/MS8U5yjv8HC+XDcTfXnlTsbV+Upl1buC3E3Lr/EPfnNm6ndS+/FOyGtREeZn7n/w5UqehqHb9AiITX/x81LAAAI2ElEQVR4nO3WQQ0AIBDAMMC/50MDL7KkVbDn9swsAABSzu8AAACeeTgAgB4PBwDQ4+EAAHo8HABAj4cDAOjxcAAAPR4OAKDHwwEA9Hg4AIAeDwcA0OPhAAB6PBwAQI+HAwDo8XAAAD0eDgCgx8MBAPR4OACAHg8HANDj4QAAejwcAECPhwMA6PFwAAA9Hg4AoMfDAQD0eDgAgB4PBwDQ4+EAAHo8HABAj4cDAOjxcAAAPR4OAKDHwwEA9Hg4AIAeDwcA0OPhAAB6PBwAQI+HAwDo8XAAAD0eDgCgx8MBAPR4OACAHg8HANDj4QAAejwcAECPhwMA6PFwAAA9Hg4AoMfDAQD0eDgAgB4PBwDQ4+EAAHo8HABAj4cDAOjxcAAAPR4OAKDHwwEA9Hg4AIAeDwcA0OPhAAB6PBwAQI+HAwDo8XAAAD0eDgCgx8MBAPR4OACAHg8HANDj4QAAejwcAECPhwMA6PFwAAA9Hg4AoMfDAQD0');
		
		//載入底圖
		function drawImage(pic) {
			// 判斷傳入的是否為歷史紀錄的 ImageData 物件
			if (pic instanceof ImageData) {
				// 1. 建立一個臨時的 Canvas 來轉換 ImageData
				var tempCanvas = document.createElement('canvas');
				tempCanvas.width = pic.width;
				tempCanvas.height = pic.height;
				tempCanvas.getContext('2d').putImageData(pic, 0, 0);

				// 2. 計算縮放後的尺寸
				var newW = basicW * scale;
				var newH = basicH * scale;

				// 3. 同步調整雙層畫布大小
				canvas.attr('width', newW);
				canvas.attr('height', newH);
				if (typeof draftCanvas !== 'undefined') {
					draftCanvas.attr('width', newW);
					draftCanvas.attr('height', newH);
				}

				// 4. 將臨時 Canvas 縮放並繪製到主畫布上
				context.drawImage(tempCanvas, 0, 0, pic.width, pic.height, 0, 0, newW, newH);

				// 5. 重新初始化畫筆並結束，不需重複執行底下的 Image 載入邏輯
				initPaint();
				return; 
			}

			// --- 以下為原本處理 URL 字串的邏輯 ---
			var image = new Image();
			image.src = pic;
			$(image).load(function () {
				if(basicW == 0){
					var rate = 1;
					var w1 = $(window).width() * 0.9;
					var h1 = $(window).height() * 0.9;
					var w2 = this.width;
					var h2 = this.height;
					if(w2 > w1 || h2 > h1){
						rate = w1/w2;
						rate = rate > h1/h2 ? h1/h2 : rate;
					}
					basicW = w2 * rate;
					basicH = h2 * rate;
				}
				
				imageW = basicW;
				imageH = basicH;
			
				var newW = imageW * scale;
				var newH = imageH * scale;

				canvas.attr('width', newW);
				canvas.attr('height', newH);
				if (typeof draftCanvas !== 'undefined') {
					draftCanvas.attr('width', newW);
					draftCanvas.attr('height', newH);
				}

				context.drawImage(image, 0, 0, this.width, this.height, 0, 0, newW, newH);
				initPaint();
			
				cStep = -1;
				cPushArray = new Array();
				cPush();
			});    
		}
		
		 $(".toolPainterA, .toolPainterB, .toolPainterLine").hover(
	   	   function(){
		      $(this).addClass("selectTool");
		   },  
		   function(){  
		      $(this).removeClass("selectTool");
		   }
	   );
	   
	   //畫布內容
	   function initPaint(){
	 		context.lineWidth = $("#lineWidth").val();
	 		context.strokeStyle = $("#strokeStyle").val();
			context.fillStyle = $("#fillStyle").val();
			context.lineCap = "round";
			context.lineJoin = "round";
			context.font = "normal 400 10pt Arial";
			tool.drawType = $("#drawtype").val();
			
			draftContext.lineWidth = $("#lineWidth").val();
			draftContext.strokeStyle = $("#strokeStyle").val();
			draftContext.fillStyle = $("#fillStyle").val();
			draftContext.lineCap = "round";
			draftContext.lineJoin = "round";
			draftContext.font = "normal 400 10pt Arial";
	   }
	   
	   $(".toolPainterA").click(function(){
	    	var id = $(this).attr('id');
	    	if(id == 'save')
	    		cSave();
	    	else if(id == 'undo')
	    		cUndo();

	    		cSpace();

	   });
	   
	   $(".toolPainterB").click(function(){

		   if('select,cut'.indexOf(id) == -1){

	      if(id == 'pencil')

	      }else if(id == 'rectangle')
	      	 $("#drawtype").val('strokeRect');
	      else if(id == 'ellipse')

	      else if(id == 'text')
	      	 $("#drawtype").val('drawText');
	      else if(id == 'arrow')
	      	 $("#drawtype").val('drawArrow');
		  else if(id == 'straightLine')
	      	 $("#drawtype").val('drawStraightLine');
		  else if(id == 'select')
			cSelect();

			 cCut();

		   	  '<tr><td>屬性：</td><td>' + 
		   	  '<span class="wordPainter" id="boldword" style="background-image: url(\'images/painter/bold.gif\');"/>&nbsp;' + 
		   	  '<span class="wordPainter" id="italicword" style="background-image: url(\'images/painter/italic.gif\');"/>&nbsp;' +
			  '<span class="wordPainter" id="underlineword" style="background-image: url(\'images/painter/underline.gif\');"/>' +
		   	  '</td></tr></table>';
		   $("#canvasDialog").empty().append(content).dialog(opt).dialog("open");
		   	
		   $(".wordPainter").hover(
		   	  function(){
			     $(this).addClass("selectTool");
			  },  
			  function(){  
			     $(this).removeClass("selectTool");
			  }
		   ).click(function(){
		   	  $(this).toggleClass("selectedTool");
		   });
	   }
	   
	   //寫入文字
	   function endWord(){
	   		var fontstyle = ($("#italicword").hasClass("selectedTool")?'italic':'normal') + ' ' + 
	   			($("#boldword").hasClass("selectedTool")?'700':'400') + ' ' + 
	   			$("#wordsize").val() + 'pt ' + $("#wordfontfamily").val();
	   		context.font = fontstyle;
	 		tool.execute($("#wordinput").val(), $("#wordsize").val(), $("#underlineword").hasClass("selectedTool"), start[0], start[1]);
			cPush();
			start = new Array();
			drawing = false;
	   }
	   
	   //增加畫布空白長度
	   //增加畫布空白長度
		function cSpace(){
			var opt = new Object();
			opt.autoOpen = false;
			opt.resizable = false;
			opt.closeOnEscape = false;
			opt.close = function(){ $(this).dialog("destroy"); };
			opt.title = "請輸入空白區塊長度";
			opt.width = $(window).width() * 0.3;
			opt.height = $(window).height() * 0.2;
			opt.buttons = {  
				"確定": function(){
					var isOk = true;
					if(isNaN($("#spacelength").val())){
						alert('請輸入數值');
						isOk = false;
					} else {
						var length = parseInt($("#spacelength").val(), 10);
						// 1. 先把原本主畫布的影像備份起來
						var tmp = context.getImageData(0, 0, canvas[0].width, canvas[0].height);
						
						// 計算新的總高度
						length = length + canvas[0].height;
						
						// 2. 【關鍵修改】同步拉長主畫布與草稿層的高度！
						canvas.attr('height', length);
						draftCanvas.attr('height', length);
						
						// 3. 幫主畫布填上白色底，再把備份的影像貼回原位
						context.clearRect(0, 0, canvas[0].width, length);
						context.fillStyle = '#fff';
						context.fillRect(0, 0, canvas[0].width, length);
						context.putImageData(tmp, 0, 0);
						
						// 4. 因為畫布大小改變會清空畫筆設定，所以必須重新初始化兩層的畫筆
						initPaint();
					}
					if(isOk) {
						$(this).dialog("destroy");
					}
				},
				"關閉": function(){
					$(this).dialog("destroy");                    
				}
			};
		   
			var content = '<table><tr><td>像素：</td><td><input type="text" id="spacelength" value="100" maxlength="4" size="10"></td></tr></table>';
			$("#canvasDialog").empty().append(content).dialog(opt).dialog("open");
		}
	
	   $("#colorPickerA").colorpicker({
	      inline: false,
	      color: $("#strokeStyle").val(),
	      ok: function(event, color){
	         $("#strokeStyle").val('#' + color.formatted);
	         $("#strokeStylebackup").val('#' + color.formatted);
	      	 $(this).css('background-color', '#' + color.formatted);
	      	 initPaint();
	      }
	  });
	  
	   $("#colorPickerB").colorpicker({
	      inline: false,
	      color: $("#fillStyle").val(),
	      ok: function(event, color){
	         $("#fillStyle").val('#' + color.formatted);
	      	 $(this).css('background-color', '#' + color.formatted);
	      	 initPaint();
	      }
	  });
	  
	  $("#undo,#redo").addClass('selectedTool').attr('disabled', true);
	      
	  $("#magnifier").slider({
		value:100,
		min: 50,
		max: 250,
		step: 25,
		slide: function( event, ui ) {
			$( "#amount" ).empty().append(ui.value + '%');
			scale = ui.value/100;
			drawImage(cPushArray[cStep]);
		}
	  });
	  
	  // 裁切選取區塊功能
	  $("#selectDiv").resizable().draggable().mouseup(function (){    
			$("#x1").val($('#selectDiv').offset().left);
			$("#y1").val($('#selectDiv').offset().top);
			$("#x2").val($('#selectDiv').offset().left + parseInt($('#selectDiv').css('width').replace('px',''), 10));
			$("#y2").val($('#selectDiv').offset().top + parseInt($('#selectDiv').css('height').replace('px',''),  10));
						
			var x1 = $("#x1").val();
			var y1 = $("#y1").val();
			var x2 = $("#x2").val();
			var y2 = $("#y2").val();
			var cx1 = canvas.offset().left;
			var cy1 = canvas.offset().top;
			var cx2 = canvas.offset().left + canvas[0].width;
			var cy2 = canvas.offset().top + canvas[0].height;
						
			if(x1 < cx1)
				$("#x1").val(cx1);
			if(y1 < cy1)
				$("#y1").val(cx1);
			if(cx2 < x2)
				$("#x2").val(cx2);
			if(cy2 < y2)
				$("#y2").val(cy2);
						
			if(cx2 < x1 || cy2 < y1 || x2 < cx1 || y2 < cy1)
				$("#x1").val("X");
       });

	  function cSelect(){
			$("#selectDiv").show();
			
			var left = canvas.attr('width') / 2 - 50;
			var top = canvas.attr('height') / 2 - 50;
			$("#selectDiv").css("width", 100).css("height", 100).css('left', left).css('top', top);
			
			$("#x1").val($('#selectDiv').offset().left);
			$("#y1").val($('#selectDiv').offset().top);
			$("#x2").val($('#selectDiv').offset().left + parseInt($('#selectDiv').css('width').replace('px',''), 10));
			$("#y2").val($('#selectDiv').offset().top + parseInt($('#selectDiv').css('height').replace('px',''),  10));
		}
	   
	   function cCut(){
			if($("#x1").val() != 'X'){
				var x = confirm('是否確定要將圖片進行裁切？');
				if(x){
					$("#drawtype").val('');
					var x1 = parseInt($("#x1").val(), 10) - canvas.offset().left;
					var y1 = parseInt($("#y1").val(), 10) - canvas.offset().top;
					var x2 = parseInt($("#x2").val(), 10) - canvas.offset().left;
					var y2 = parseInt($("#y2").val(), 10) - canvas.offset().top;
					
					// 計算新的寬高
					var newWidth = x2 - x1;
					var newHeight = y2 - y1;

					// 取得主畫布裁切範圍內的影像資料 (修正：後兩個參數應該是寬高)
					var tmp = context.getImageData(x1, y1, newWidth, newHeight);

					// 【關鍵修改】同時改變「主畫布」與「草稿畫布」的大小！
					canvas.attr('width', newWidth);
					canvas.attr('height', newHeight);
					draftCanvas.attr('width', newWidth);
					draftCanvas.attr('height', newHeight);

					// 將裁切後的影像貼回主畫布 (直接貼在 0, 0 的起始位置即可)
					context.putImageData(tmp, 0, 0);

					// 恢復 UI 狀態
					$(".toolPainterB").css('background-color', '#F5F3E5');
					$("#pencil").css('background-color', '#97CBFF');
					$("#drawtype").val('drawLine');
					
					// 重新初始化兩層畫布的畫筆設定 
					// (注意：HTML5 Canvas 只要一改變寬高，內部的畫筆樣式就會被系統清空，所以一定要重新 init)
					initPaint();
					
					// 重新記錄歷史
					cStep = -1;
					cPushArray = new Array();
					cPush();
					
					$("#x1").val('X');
					$("#selectDiv").hide();
				}
			} else {
				alert('請選取裁切範圍');
			}
		}
   });
</script>
</head>
<body>
